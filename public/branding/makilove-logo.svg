<svg xmlns="http://www.w3.org/2000/svg" width="680" height="660" viewBox="0 0 680 660" role="img" aria-label="MakiLove Logo">
  <title>MakiLove — Logo (primäres Lockup)</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rock+Salt&amp;family=Mulish:wght@400;700&amp;display=swap');
      .wm { font-family: 'Rock Salt', 'Segoe Script', 'Bradley Hand', cursive; fill:#FFFFFF; }
      .tg { font-family: 'Mulish', system-ui, sans-serif; fill:#E7E3DE; }
    </style>
    <linearGradient id="bgDark" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#2A2C31"/>
      <stop offset="1" stop-color="#16171A"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#D42028"/>
      <stop offset="1" stop-color="#770110"/>
    </linearGradient>
    <radialGradient id="rice" cx="0.42" cy="0.38" r="0.72">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#ECE8E0"/>
    </radialGradient>
    <radialGradient id="nori" cx="0.42" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#2C3033"/>
      <stop offset="1" stop-color="#14161A"/>
    </radialGradient>
    <g id="maki">
      <circle r="150" fill="url(#nori)"/>
      <circle r="134" fill="url(#rice)"/>
      <g fill="#F2F0EA" stroke="#D9D4C8" stroke-width="1" opacity="0.92">
        <ellipse rx="13" ry="7" transform="translate(126,0) rotate(90)"/>
        <ellipse rx="13" ry="7" transform="translate(95.3,55) rotate(120)"/>
        <ellipse rx="13" ry="7" transform="translate(63,109.1) rotate(150)"/>
        <ellipse rx="13" ry="7" transform="translate(0,110) rotate(180)"/>
        <ellipse rx="13" ry="7" transform="translate(-63,109.1) rotate(210)"/>
        <ellipse rx="13" ry="7" transform="translate(-95.3,55) rotate(240)"/>
        <ellipse rx="13" ry="7" transform="translate(-126,0) rotate(270)"/>
        <ellipse rx="13" ry="7" transform="translate(-95.3,-55) rotate(300)"/>
        <ellipse rx="13" ry="7" transform="translate(-63,-109.1) rotate(330)"/>
        <ellipse rx="13" ry="7" transform="translate(0,-110) rotate(0)"/>
        <ellipse rx="13" ry="7" transform="translate(63,-109.1) rotate(30)"/>
        <ellipse rx="13" ry="7" transform="translate(95.3,-55) rotate(60)"/>
      </g>
      <path transform="translate(0,-4) scale(1.7)" fill="url(#redGrad)"
