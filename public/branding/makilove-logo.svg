  <rect x="0" y="0" width="680" height="660" fill="url(#bgDark)"/>

  <g transform="translate(340,250)">
    <circle r="184" fill="#D42028" opacity="0.08"/>
    <circle r="168" fill="#D42028" opacity="0.11"/>
    <circle r="157" fill="#1B1C20"/>
    <circle r="156" fill="none" stroke="#D42028" stroke-width="7" opacity="0.85"/>
    <use href="#maki"/>
  </g>

  <text class="wm" x="313" y="510" font-size="112" text-anchor="end">Maki</text>
  <path transform="translate(340,478) scale(0.62)" fill="url(#redGrad)"
    d="M0 -22 C -10 -40 -40 -34 -40 -8 C -40 12 -18 28 0 40 C 18 28 40 12 40 -8 C 40 -34 10 -40 0 -22 Z"/>
  <text class="wm" x="367" y="510" font-size="112" text-anchor="start">Love</text>

  <text class="tg" x="340" y="590" font-size="19" letter-spacing="7" text-anchor="middle" opacity="0.62">SUSHI · MAKI · BAD KISSINGEN</text>
